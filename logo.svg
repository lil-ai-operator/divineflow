<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B7BB8"/>
      <stop offset="50%" style="stop-color:#6B5B8C"/>
      <stop offset="100%" style="stop-color:#4A3B6B"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#orbGrad)" stroke-width="1" opacity="0.3"/>
  
  <!-- Main orb background -->
  <circle cx="100" cy="100" r="70" fill="url(#orbGrad)" opacity="0.15"/>
  
  <!-- Lotus petals -->
  <g transform="translate(100,100)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="12" fill="url(#glowGrad)" filter="url(#glow)"/>
    
    <!-- Inner petals -->
    <ellipse cx="0" cy="-25" rx="8" ry="15" fill="url(#orbGrad)" opacity="0.9"/>
    <ellipse cx="0" cy="25" rx="8" ry="15" fill="url(#orbGrad)" opacity="0.9"/>
    <ellipse cx="-25" cy="0" rx="15" ry="8" fill="url(#orbGrad)" opacity="0.9"/>
    <ellipse cx="25" cy="0" rx="15" ry="8" fill="url(#orbGrad)" opacity="0.9"/>
    
    <!-- Diagonal petals -->
    <ellipse cx="-18" cy="-18" rx="7" ry="12" fill="url(#orbGrad)" opacity="0.7" transform="rotate(-45)"/>
    <ellipse cx="18" cy="-18" rx="7" ry="12" fill="url(#orbGrad)" opacity="0.7" transform="rotate(45)"/>
    <ellipse cx="-18" cy="18" rx="7" ry="12" fill="url(#orbGrad)" opacity="0.7" transform="rotate(45)"/>
    <ellipse cx="18" cy="18" rx="7" ry="12" fill="url(#orbGrad)" opacity="0.7" transform="rotate(-45)"/>
    
    <!-- Outer petals -->
    <ellipse cx="0" cy="-45" rx="6" ry="12" fill="url(#orbGrad)" opacity="0.5"/>
    <ellipse cx="0" cy="45" rx="6" ry="12" fill="url(#orbGrad)" opacity="0.5"/>
    <ellipse cx="-45" cy="0" rx="12" ry="6" fill="url(#orbGrad)" opacity="0.5"/>
    <ellipse cx="45" cy="0" rx="12" ry="6" fill="url(#orbGrad)" opacity="0.5"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="60" cy="60" r="2" fill="#D4AF37" filter="url(#glow)"/>
  <circle cx="140" cy="70" r="1.5" fill="#D4AF37" filter="url(#glow)"/>
  <circle cx="70" cy="140" r="1.5" fill="#D4AF37" filter="url(#glow)"/>
  <circle cx="145" cy="135" r="2" fill="#D4AF37" filter="url(#glow)"/>
</svg>